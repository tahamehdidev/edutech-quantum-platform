name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint (incl. layering rules), Format Check, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/backend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  frontend:
    name: Frontend — Lint, Format Check, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/frontend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
