name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint (incl. layering rules), Format Check, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend
    services:
      # Bootstrap superuser only, same as docker-compose.yml locally -- migrations/000
      # creates the restricted app_user role inside each database, migrate.js connects
      # via ADMIN_DATABASE_URL/ADMIN_TEST_DATABASE_URL as this role.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_admin_password
          POSTGRES_DB: edutech_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://app_user:app_password@localhost:5432/edutech_dev
      TEST_DATABASE_URL: postgresql://app_user:app_password@localhost:5432/edutech_test
      ADMIN_DATABASE_URL: postgresql://postgres:postgres_admin_password@localhost:5432/edutech_dev
      ADMIN_TEST_DATABASE_URL: postgresql://postgres:postgres_admin_password@localhost:5432/edutech_test
      # CI-only value, never used outside this workflow -- not a real secret to manage.
      JWT_ACCESS_SECRET: ci_only_placeholder_secret_do_not_use_in_prod
      FRONTEND_URL: http://localhost:5173
      PORT: 4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/backend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run format:check
      - name: Create test database
        run: node -e "const {Client}=require('pg');(async()=>{const c=new Client({connectionString:process.env.ADMIN_DATABASE_URL});await c.connect();await c.query('CREATE DATABASE edutech_test');await c.end();})();"
      - run: npm run migrate
      - run: npm run migrate:test
      - run: npm test

  frontend:
    name: Frontend — Lint, Format Check, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/frontend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
