# Render Blueprint (https://render.com/docs/blueprint-spec) -- lets Render provision the
# backend web service and its Postgres database from one file instead of manual dashboard
# clicks. Deploy via the Render dashboard's "New > Blueprint", pointed at this repo.
#
# Two-role Postgres setup, same as local dev (see docs/03-security-architecture.md §8.2):
# a bootstrap/owner role runs migrations (000_create_app_role.sql's `CREATE ROLE app_user`
# needs CREATEROLE, which Render's free-tier Postgres role turned out to actually have), and
# the restricted `app_user` role -- created by that migration, with UPDATE/DELETE on
# `audit_log` REVOKEd from it -- is what the running server connects as. DATABASE_URL is
# therefore `sync: false` here, not `fromDatabase`: the database resource's own connection
# string is the elevated owner role, used only for one-off migrate/seed runs from a local
# machine (never by the running server), while DATABASE_URL is manually set in Render's
# dashboard to a separate connection string using `app_user`'s own credentials (that role's
# password was rotated away from migrations/000's hardcoded local-dev value before this was
# set, since that file is public). If a future deploy's role genuinely lacks CREATEROLE, fall
# back to pointing DATABASE_URL at the same owner connection string instead -- the REVOKE
# becomes a documented no-op in that case, not a secret gap.

databases:
  - name: qubit-postgres
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: qubit-backend
    runtime: node
    plan: free
    rootDir: code/backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Manually set in Render's dashboard to app_user's own connection string (not the
      # database resource's owner connection string) -- see the file header comment.
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      # Set once the frontend's real Vercel URL is known (chicken-and-egg: this service needs
      # to exist first so the frontend has an API URL to build against). No default/wildcard --
      # exactly one trusted origin (docs/03-security-architecture.md §6.1).
      - key: FRONTEND_URL
        sync: false
      # Optional (Phase 5 Polish) -- leave unset to keep Sentry a genuine no-op.
      - key: SENTRY_DSN
        sync: false
